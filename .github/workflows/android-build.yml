name: Build Android APK

on:
  push:
    branches: [ main, master ]

# Memaksa penggunaan Node 24 sesuai saran log GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Menggunakan versi terbaru

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Initialize & Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap init "My App" "com.example.app" --web-dir dist
            npx cap add android
          fi
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # Menambahkan flag --no-daemon dan --clean untuk menghindari error Jar korup
          ./gradlew clean assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
